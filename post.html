<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla de cuento</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
            font-family: "Liberation Sans", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #080808;
            color: #ececec;
            display: grid;
            place-items: center;
        }

        main {
            width: min(92%, 780px);
            border: 1px solid #4a4a4a;
            background: #101010;
            padding: 24px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.6rem;
        }

        p {
            margin: 0 0 10px;
            color: #d8d8d8;
            line-height: 1.5;
        }

        code {
            color: #f4f4f4;
        }
    </style>
</head>
<body>
    <main>
        <h1>Plantilla para nuevos cuentos</h1>
        <p>Los cuentos ahora van en la carpeta <code>cuentos/</code>.</p>
        <p>Duplica un archivo de esa carpeta para cargar un cuento nuevo en el futuro.</p>
    </main>
</body>
</html>
