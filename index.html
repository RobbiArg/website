<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUENTOS</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
            font-family: "Liberation Sans", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #080808;
            color: #ececec;
            display: grid;
            place-items: center;
        }

        main {
            width: min(92%, 780px);
            border: 1px solid #4a4a4a;
            background: #101010;
            padding: 24px;
        }

        .base-box {
            display: block;
            text-decoration: none;
            color: #f4f4f4;
            border: 1px solid #676767;
            background: #161616;
            padding: 18px;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: background 0.2s ease;
        }

        .base-box:hover,
        .base-box:focus-visible {
            background: #202020;
        }
    </style>
</head>
<body>
    <main>
        <a class="base-box" href="post.html">La carta en el buzón rojo</a>
        <a class="base-box" href="cuento-linterna.html">La linterna del pasillo</a>
    </main>
</body>
</html>
